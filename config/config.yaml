orchestrator:
  analysis_universe: [QQQ, SOXX, VIX]
  db_path: outputs/orchestrator.sqlite

  runtime:
    lang: zh
    # window_days: 数据检索窗口（技术与新闻上下文工具返回的时间跨度）。
    # 与 technical.days 对齐;分析判断窗口(1-5 交易日)由各 analyst prompt 内部定义。
    window_days: 60
    max_debate_rounds: 3

  allocation:
    investable_assets: [QQQ, SOXX]

  ai4trade:
    # Loaded from .env or the process environment; never commit the real token.
    token: ${AI4TRADE_TOKEN}

  reflection:
    enabled: true
    reflection_version: v1
    promote_mode: auto
    task_limit: 10
    parallelism: 2
    prediction_horizon_trading_days: 3
    deep:
      loss_return: -0.02
      excess_return: -0.015
      high_confidence: 0.70
      calibration_error: 0.40
      repeated_error_count: 2
    retrieval:
      token_budget: 4000
      max_items: 20
      min_quality: 0.6

  workflow:
    agent_timeout_sec: 600
    reducer_timeout_sec: 600
    phase1:
      parallelism: 2
      critical_roles: [analyst.technical, analyst.news_macro]
    policy:
      # Keep Trader -> Risk Committee -> Portfolio Manager as mandatory workflow stages.
      mode: legacy

  prompts:
    reflection:
      historical: prompts/phase0/historical_reflection.md
    analyst:
      technical: prompts/phase1/technical.md
      news_macro: prompts/phase1/news_macro.md
    compressor:
      phase_summary: prompts/phase_summary/phase_summary.md
    phase2:
      topic_generator: prompts/phase2/topic_generator.md
      bull_initial: prompts/phase2/bull.md
      bull_interaction: prompts/phase2/bull.md
      bear_initial: prompts/phase2/bear.md
      bear_interaction: prompts/phase2/bear.md
    mediator:
      topic_controller: prompts/phase2/topic_controller.md
    manager:
      research: prompts/phase3/research_manager.md
    trader: prompts/phase4/trader.md
    risk:
      aggressive: prompts/phase5/aggressive.md
      neutral: prompts/phase5/neutral.md
      conservative: prompts/phase5/conservative.md
    portfolio:
      manager: prompts/phase6/portfolio_manager.md

  llm:
    gateway:
      base_url: &llm_gateway_base_url ${LLM_GATEWAY_BASE_URL}
      # Require an env-provided key; never ship a real default secret in-repo.
      api_key: &llm_gateway_api_key ${LLM_GATEWAY_API_KEY}
    defaults:
      route: chat_completions
      model: deepseek-v4-flash
      base_url: *llm_gateway_base_url
      api_key: *llm_gateway_api_key
      # The gateway's implicit cap truncates schema-valid multi-agent artifacts.
      # Roles may lower this explicitly, but the workflow needs room for its
      # mandatory analysis trace and structured evidence fields.
      max_completion_tokens: 12288
      reasoning_effort: low
      reasoning_summary: auto
      preserve_reasoning_state: false
      tools: []
    judge:
      enabled: false

  web_search:
    mode: live
    provider: exa
    base_url: https://mcp.exa.ai/mcp
    context_size: medium
    max_result_chars: 12000

technical:
  days: 60
  sleep_sec: 1
  parallelism: 10

jin10:
  api_url: https://4a735ea38f8146198dc205d2e2d1bd28.z3c.jin10.com/flash
  channel: -8200
  vip: 1
  classify: 53,76,83,86,90,92,118,79,25,24,16,18,2,3,27
  lookback_hours: 24.0
  pages: 200
  timeout: 15.0

report:
  mode: build-and-send
  email:
    enabled: true
    smtp_url: smtps://smtp.mail.me.com:465
    username: ${REPORT_SMTP_USERNAME}
    password: ${REPORT_SMTP_PASSWORD}
    from: ${REPORT_SMTP_FROM}
    to: ${REPORT_SMTP_TO}
