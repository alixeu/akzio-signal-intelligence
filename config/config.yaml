orchestrator:
  analysis_universe: [QQQ, SOXX, VIX]
  db_path: outputs/orchestrator.sqlite

  runtime:
    lang: zh
    # window_days: 数据检索窗口（技术与新闻上下文工具返回的时间跨度）。
    # 与 technical.days 对齐;分析判断窗口(1-5 交易日)由各 analyst prompt 内部定义。
    window_days: 60
    max_debate_rounds: 3

  allocation:
    investable_assets: [QQQ, SOXX]

  workflow:
    agent_timeout_sec: 600
    reducer_timeout_sec: 600
    phase1:
      parallelism: 2
      critical_roles: [analyst.technical, analyst.news_macro]
    policy:
      # Keep Trader -> Risk Committee -> Portfolio Manager as mandatory workflow stages.
      mode: legacy

  prompts:
    compressor:
      phase00: prompts/compressors/phase00.md
    phase2:
      bull_initial: prompts/researchers/bull.md
      bull_interaction: prompts/researchers/bull.md
      bear_initial: prompts/researchers/bear.md
      bear_interaction: prompts/researchers/bear.md

  llm:
    gateway:
      base_url: &llm_gateway_base_url ${LLM_GATEWAY_BASE_URL}
      # Require an env-provided key; never ship a real default secret in-repo.
      api_key: &llm_gateway_api_key ${LLM_GATEWAY_API_KEY}
    defaults:
      route: chat_completions
      model: deepseek-v4-flash
      base_url: *llm_gateway_base_url
      api_key: *llm_gateway_api_key
      reasoning_effort: low
      reasoning_summary: auto
      preserve_reasoning_state: false
      tools: []
    judge:
      enabled: false

  web_search:
    mode: live
    provider: exa
    base_url: https://mcp.exa.ai/mcp
    context_size: medium
    max_result_chars: 12000

technical:
  days: 60
  sleep_sec: 1
  parallelism: 10

jin10:
  api_url: https://4a735ea38f8146198dc205d2e2d1bd28.z3c.jin10.com/flash
  channel: -8200
  vip: 1
  classify: 53,76,83,86,90,92,118,79,25,24,16,18,2,3,27
  lookback_hours: 24.0
  pages: 200
  timeout: 15.0

report:
  mode: build-and-send
  email:
    enabled: true
    smtp_url: smtps://smtp.mail.me.com:465
    username: ${REPORT_SMTP_USERNAME}
    password: ${REPORT_SMTP_PASSWORD}
    from: ${REPORT_SMTP_FROM}
    to: ${REPORT_SMTP_TO}
