orchestrator:
  analysis_universe: [QQQ, SOXX, VIX]
  phase1_agents: technical,news
  db_path: outputs/orchestrator.sqlite

  runtime:
    lang: zh
    # window_days: 数据检索窗口(read_run_context 返回的时间跨度)。
    # 与 technical.days 对齐;分析判断窗口(1-5 交易日)由各 analyst prompt 内部定义。
    window_days: 60
    max_debate_rounds: 3

  allocation:
    investable_assets: [QQQ, SOXX]

  workflow:
    agent_timeout_sec: 600
    reducer_timeout_sec: 600

  llm:
    gateway:
      base_url: &llm_gateway_base_url ${LLM_GATEWAY_BASE_URL:-https://oneapi-comate.baidu-int.com/v1}
      # Require an env-provided key; never ship a real default secret in-repo.
      api_key: &llm_gateway_api_key ${LLM_GATEWAY_API_KEY:-sk-GASkzZyd3qELeEcC35D239D73f3c49D784659995B3114a6a}
    defaults:
      route: responses
      model: gpt-5.4
      base_url: *llm_gateway_base_url
      api_key: *llm_gateway_api_key
      reasoning_effort: null
      reasoning_summary: auto
      preserve_reasoning_state: false
      tools: read_run_context

  web_search:
    provider: exa
    base_url: https://mcp.exa.ai/mcp
    context_size: medium
    max_result_chars: 12000

  analyst_weights:
    technical: 40.0
    news_macro: 35.0

technical:
  days: 60
  model: YahooTechnical
  sleep_sec: 1

jin10:
  api_url: https://4a735ea38f8146198dc205d2e2d1bd28.z3c.jin10.com/flash
  channel: -8200
  vip: 1
  classify: 24,27,31,86,90,92,76,83,2,168,53,47,48,50,157,16
  lookback_hours: 24.0
  pages: 200
  timeout: 15.0

youtube:
  default_channel: rhino
  max_videos: 6
  timeout_sec: 20
  channels:
    rhino:
      handle: rhinofinance
      display_name: Rhino Finance
      source_url: https://youtube.com/@rhinofinance

wayinvideo:
  task: 视频逐字稿
  existing_task_url: https://wayinvideo-api.wayin.ai/api/highlight_moment/task
  timeout_sec: 60
  username: ${WAYINVIDEO_USERNAME}
  password: ${WAYINVIDEO_PASSWORD}

report:
  mode: build-and-send
  email:
    enabled: true
    smtp_url: smtps://smtp.mail.me.com:465
    username: ${REPORT_SMTP_USERNAME}
    password: ${REPORT_SMTP_PASSWORD}
    from: ${REPORT_SMTP_FROM}
    to: ${REPORT_SMTP_TO}
